<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Track Visualization</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; }
        svg { border: 1px solid #000; }
    </style>
</head>
<body>
    <h1>Complex Race Track SVG Visualization</h1>
    <svg viewBox="0 0 800 400" width="800" height="400">
        <path d="M100 300 Q 200 100, 300 300 T 500 300" fill="none" stroke="black" stroke-width="4"/>
        <circle cx="100" cy="300" r="10" fill="red" />
        <circle cx="300" cy="300" r="10" fill="red" />
        <circle cx="500" cy="300" r="10" fill="red" />
    </svg>
</body>
</html>
